<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOB — Concept 09: Wire</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#060810;font-family:'Inter',sans-serif;overflow:hidden;}
body{display:flex;align-items:center;justify-content:center;position:relative;}
canvas#net{position:fixed;inset:0;z-index:0;}
.corner{position:fixed;font-family:'JetBrains Mono',monospace;font-size:9px;z-index:5;line-height:2;}
.corner.tl{top:20px;left:20px;color:rgba(100,140,255,0.25);}
.corner.tr{top:20px;right:20px;color:rgba(100,140,255,0.25);text-align:right;}
.corner .hi{color:rgba(100,140,255,0.6);}
.card{position:relative;z-index:10;background:rgba(6,8,16,0.88);border:1px solid rgba(100,140,255,0.15);border-radius:12px;padding:44px 40px;width:360px;backdrop-filter:blur(12px);box-shadow:0 0 60px rgba(60,100,255,0.08);}
.logo{font-size:11px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:rgba(100,140,255,0.4);margin-bottom:36px;font-family:'JetBrains Mono',monospace;}
.logo strong{color:rgba(150,180,255,0.9);}
h1{font-size:24px;font-weight:400;color:#e8eeff;letter-spacing:-0.03em;margin-bottom:6px;}
.sub{font-size:12px;color:rgba(150,180,255,0.3);font-family:'JetBrains Mono',monospace;margin-bottom:36px;}
.field{margin-bottom:16px;}
label{display:block;font-size:10px;font-weight:500;color:rgba(150,180,255,0.35);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:7px;}
input{width:100%;background:rgba(100,140,255,0.05);border:1px solid rgba(100,140,255,0.15);border-radius:7px;padding:12px 14px;font-size:13px;font-family:'JetBrains Mono',monospace;color:#e8eeff;outline:none;transition:border-color 0.2s;}
input::placeholder{color:rgba(100,140,255,0.15);}
input:focus{border-color:rgba(100,140,255,0.5);box-shadow:0 0 0 3px rgba(100,140,255,0.05);}
button{width:100%;margin-top:20px;padding:12px;background:rgba(100,140,255,0.15);border:1px solid rgba(100,140,255,0.3);border-radius:7px;color:rgba(150,180,255,0.9);font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.1em;cursor:pointer;transition:all 0.2s;}
button:hover{background:rgba(100,140,255,0.25);border-color:rgba(100,140,255,0.5);}
.nodes-count{margin-top:18px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:9px;color:rgba(100,140,255,0.25);}
.nodes-count span{color:rgba(100,140,255,0.5);}
.tag{position:fixed;bottom:16px;right:16px;font-size:9px;color:rgba(100,140,255,0.1);z-index:20;font-family:'JetBrains Mono',monospace;}
</style>
</head>
<body>
<canvas id="net"></canvas>
<div class="corner tl">
  <div>GOB <span class="hi">v0.2.0</span></div>
  <div>mesh <span class="hi" id="nc">—</span> nodes</div>
  <div>uptime <span class="hi" id="upt4">—</span></div>
</div>
<div class="corner tr">
  <div>cpu <span class="hi" id="cpu4">—</span></div>
  <div>mem <span class="hi" id="mem4">—</span></div>
  <div>agents <span class="hi">3</span></div>
</div>
<div class="card">
  <div class="logo"><strong>GOB</strong> // network auth</div>
  <h1>Sign in</h1>
  <p class="sub">$ connect --auth _</p>
  <div class="field"><label>Node ID</label><input type="email" placeholder="operator@domain.com" autofocus></div>
  <div class="field"><label>Secret</label><input type="password" placeholder=""></div>
  <button>[ CONNECT ]</button>
  <div class="nodes-count">mesh integrity <span id="integrity">98.4</span>%</div>
</div>
<div class="tag">concept-09-wire</div>
<script>
const cv=document.getElementById('net'),ctx=cv.getContext('2d');
let W,H,nodes=[];
function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
resize();window.addEventListener('resize',()=>{resize();init();});

const NODE_COUNT=55;
function init(){
  nodes=[];
  for(let i=0;i<NODE_COUNT;i++) nodes.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-0.5)*0.4,vy:(Math.random()-0.5)*0.4,r:Math.random()*2+1,pulse:Math.random()*Math.PI*2});
  document.getElementById('nc').textContent=NODE_COUNT;
}
init();

const DIST=140;
function draw(){
  ctx.clearRect(0,0,W,H);
  nodes.forEach(n=>{n.x+=n.vx;n.y+=n.vy;n.pulse+=0.02;if(n.x<0||n.x>W)n.vx*=-1;if(n.y<0||n.y>H)n.vy*=-1;});
  // edges
  for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){
    const dx=nodes[i].x-nodes[j].x,dy=nodes[i].y-nodes[j].y,d=Math.sqrt(dx*dx+dy*dy);
    if(d<DIST){const a=(1-d/DIST)*0.18;ctx.strokeStyle=`rgba(80,120,255,${a})`;ctx.lineWidth=0.8;ctx.beginPath();ctx.moveTo(nodes[i].x,nodes[i].y);ctx.lineTo(nodes[j].x,nodes[j].y);ctx.stroke();}
  }
  // nodes
  nodes.forEach(n=>{
    const glow=0.4+Math.sin(n.pulse)*0.2;
    ctx.fillStyle=`rgba(100,150,255,${glow})`;
    ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);ctx.fill();
  });
  requestAnimationFrame(draw);
}
draw();

let start=Date.now()-(2*86400+18*3600+33*60)*1000;
function tick(){const e=Date.now()-start,d=Math.floor(e/86400000),h=Math.floor((e%86400000)/3600000),m=Math.floor((e%3600000)/60000);document.getElementById('upt4').textContent=d+'d '+String(h).padStart(2,'0')+'h '+String(m).padStart(2,'0')+'m';document.getElementById('cpu4').textContent=Math.floor(8+Math.random()*14)+' %';document.getElementById('mem4').textContent=(1.1+Math.sin(Date.now()/25000)*0.3).toFixed(2)+' GB';document.getElementById('integrity').textContent=(97+Math.random()*2).toFixed(1);}
tick();setInterval(tick,3000);
</script>
</body>
</html>
