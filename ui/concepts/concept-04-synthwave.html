<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOB — Login / Concept 04: Synthwave</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #0d001a; font-family: 'Share Tech Mono', monospace; overflow: hidden; }
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
  .grid { position: fixed; bottom: 0; left: 0; right: 0; height: 50vh; background: linear-gradient(transparent, #0d001a 90%), repeating-linear-gradient(90deg, rgba(255,0,200,0.15) 0px, transparent 1px, transparent 60px), repeating-linear-gradient(0deg, rgba(255,0,200,0.15) 0px, transparent 1px, transparent 60px); background-size: 100% 100%, 60px 60px, 60px 60px; transform: perspective(400px) rotateX(45deg); transform-origin: bottom center; }
  .sun { position: fixed; top: 15%; left: 50%; transform: translateX(-50%); width: 200px; height: 100px; border-radius: 100px 100px 0 0; background: linear-gradient(to bottom, #ff6b35, #ff0080); overflow: hidden; }
  .sun-lines { position: absolute; bottom: 0; left: 0; right: 0; }
  .sun-line { height: 8px; background: #0d001a; margin-bottom: 10px; }
  .sun-line:nth-child(1){margin-bottom:14px}
  .sun-line:nth-child(2){margin-bottom:18px}
  .sun-line:nth-child(3){margin-bottom:24px}
  .mountains { position: fixed; bottom: 45vh; left: 0; right: 0; height: 120px; }
  .mountains svg { width: 100%; height: 100%; }
  .wrap { position: relative; z-index: 10; text-align: center; }
  .logo { font-family: 'Orbitron', sans-serif; font-size: 48px; font-weight: 900; background: linear-gradient(to bottom, #ff6b35, #ff0080, #cc00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; text-shadow: none; letter-spacing: 0.2em; margin-bottom: 4px; filter: drop-shadow(0 0 20px rgba(255,0,128,0.5)); }
  .sub { font-size: 11px; color: #cc00ff; letter-spacing: 0.4em; text-transform: uppercase; margin-bottom: 40px; }
  .card { background: rgba(13,0,26,0.8); border: 1px solid #cc00ff; border-radius: 4px; padding: 36px 40px; width: 360px; box-shadow: 0 0 30px rgba(204,0,255,0.2), inset 0 0 30px rgba(204,0,255,0.05); }
  .field { margin-bottom: 18px; text-align: left; }
  label { display: block; font-size: 10px; color: #cc00ff; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 8px; }
  input { width: 100%; background: rgba(204,0,255,0.05); border: 1px solid rgba(204,0,255,0.3); padding: 11px 14px; font-family: inherit; font-size: 14px; color: #ff6bff; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
  input::placeholder { color: rgba(204,0,255,0.3); }
  input:focus { border-color: #cc00ff; box-shadow: 0 0 12px rgba(204,0,255,0.3); }
  button { width: 100%; margin-top: 8px; padding: 14px; background: linear-gradient(135deg, #cc00ff, #ff0080); border: none; color: #fff; font-family: 'Orbitron', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.2em; cursor: pointer; transition: opacity 0.2s; text-transform: uppercase; }
  button:hover { opacity: 0.85; }
  .tag { position: fixed; bottom: 24px; right: 24px; font-size: 10px; color: rgba(204,0,255,0.3); letter-spacing: 0.1em; text-transform: uppercase; }
</style>
</head>
<body>
<div class="sun"><div class="sun-lines"><div class="sun-line"></div><div class="sun-line"></div><div class="sun-line"></div><div class="sun-line"></div></div></div>
<div class="mountains"><svg viewBox="0 0 1440 120" preserveAspectRatio="none"><polygon points="0,120 200,20 400,80 600,10 800,70 1000,5 1200,60 1440,30 1440,120" fill="#1a0033"/><polygon points="0,120 300,50 500,90 700,30 900,80 1100,40 1300,75 1440,50 1440,120" fill="#0d001a"/></svg></div>
<div class="grid"></div>
<div class="wrap">
  <div class="logo">GOB</div>
  <div class="sub">Neural Interface v0.2.0</div>
  <div class="card">
    <div class="field"><label>Identity</label><input type="email" placeholder="user@domain.com"></div>
    <div class="field"><label>Access Code</label><input type="password" placeholder=""></div>
    <button>Jack In</button>
  </div>
</div>
<div class="tag">Concept 04 — Synthwave</div>
</body>
</html>
