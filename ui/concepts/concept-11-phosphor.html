<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOB — Concept 11: Phosphor</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#02080a;font-family:'JetBrains Mono',monospace;overflow:hidden;color:#4dff91;}
body{display:flex;align-items:center;justify-content:center;position:relative;}

/* atmospheric glow */
.atmos{position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 80% 50% at 50% 60%,rgba(0,80,40,0.12) 0%,transparent 100%);}

/* grid floor */
.grid{position:fixed;bottom:0;left:0;right:0;height:38%;
  background:
    repeating-linear-gradient(90deg,rgba(0,200,80,0.07) 0,transparent 1px,transparent 80px),
    repeating-linear-gradient(0deg,rgba(0,200,80,0.07) 0,transparent 1px,transparent 80px);
  transform:perspective(600px) rotateX(52deg);transform-origin:bottom center;
  mask-image:linear-gradient(to top,rgba(0,0,0,0.5),transparent);}
.grid-line{position:fixed;bottom:37.8%;left:0;right:0;height:1px;
  background:rgba(0,200,80,0.2);box-shadow:0 0 6px rgba(0,200,80,0.3);}

/* scanlines */
body::after{content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);
  pointer-events:none;z-index:100;}

/* vignette */
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 100% 100% at 50% 50%,transparent 50%,rgba(0,0,0,0.5) 100%);
  pointer-events:none;z-index:99;}

/* top ticker */
.ticker-wrap{position:fixed;top:0;left:0;right:0;height:24px;border-bottom:1px solid rgba(0,200,80,0.1);
  background:rgba(2,8,10,0.9);overflow:hidden;display:flex;align-items:center;z-index:50;}
.ticker{font-size:8px;color:rgba(0,200,80,0.3);white-space:nowrap;animation:tick 25s linear infinite;padding-left:100%;}
@keyframes tick{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}

/* side panels */
.side{position:fixed;font-size:9px;line-height:2.4;z-index:10;}
.side.l{left:20px;top:50%;transform:translateY(-50%);color:rgba(0,200,80,0.2);}
.side.r{right:20px;top:50%;transform:translateY(-50%);color:rgba(0,200,80,0.2);text-align:right;}
.side .v{color:rgba(0,255,100,0.55);}
.side .k{color:rgba(0,200,80,0.12);font-size:8px;letter-spacing:0.1em;}

/* card */
.card{position:relative;z-index:20;width:360px;
  border:1px solid rgba(0,200,80,0.2);
  background:rgba(2,8,10,0.9);
  padding:40px 36px;
  box-shadow:0 0 40px rgba(0,150,60,0.08),0 0 80px rgba(0,100,40,0.05),inset 0 0 30px rgba(0,100,40,0.03);}
.logo{font-size:20px;font-weight:500;color:rgba(0,255,100,0.9);letter-spacing:0.3em;
  text-shadow:0 0 20px rgba(0,255,100,0.4);margin-bottom:4px;}
.logo-sub{font-size:9px;color:rgba(0,200,80,0.25);letter-spacing:0.2em;margin-bottom:32px;}
.out{font-size:11px;color:rgba(0,200,80,0.4);line-height:1.8;margin-bottom:28px;}
.out .hi{color:rgba(0,255,100,0.7);}
.row{display:flex;align-items:center;margin-bottom:14px;}
.ps1{color:rgba(0,200,80,0.35);margin-right:10px;white-space:nowrap;font-size:11px;}
input{background:transparent;border:none;border-bottom:1px solid rgba(0,200,80,0.15);
  outline:none;font-family:inherit;font-size:12px;color:rgba(0,255,100,0.9);
  caret-color:rgba(0,255,100,0.8);flex:1;padding:6px 0;
  transition:border-color 0.2s;}
input::placeholder{color:rgba(0,200,80,0.12);}
input:focus{border-color:rgba(0,200,80,0.4);}
button{width:100%;margin-top:24px;padding:11px;
  background:transparent;border:1px solid rgba(0,200,80,0.25);
  color:rgba(0,255,100,0.8);font-family:inherit;font-size:11px;
  letter-spacing:0.15em;cursor:pointer;transition:all 0.2s;
  text-shadow:0 0 10px rgba(0,255,100,0.3);}
button:hover{background:rgba(0,200,80,0.06);border-color:rgba(0,200,80,0.6);
  box-shadow:0 0 16px rgba(0,200,80,0.1);}
.status{margin-top:16px;font-size:9px;color:rgba(0,200,80,0.2);
  display:flex;align-items:center;gap:6px;}
.pls{width:5px;height:5px;border-radius:50%;background:rgba(0,255,100,0.6);
  animation:pl 2s ease-in-out infinite;box-shadow:0 0 6px rgba(0,255,100,0.4);}
@keyframes pl{0%,100%{opacity:1}50%{opacity:0.15}}

.tag{position:fixed;bottom:16px;right:16px;font-size:9px;color:rgba(0,200,80,0.08);z-index:200;}
</style>
</head>
<body>
<div class="atmos"></div>
<div class="grid"></div>
<div class="grid-line"></div>
<div class="ticker-wrap"><div class="ticker" id="tkr"></div></div>

<div class="side l">
  <div class="k">sys.uptime</div><div class="v" id="upt">—</div>
  <div class="k" style="margin-top:12px">cpu.load</div><div class="v" id="cpu">—</div>
  <div class="k" style="margin-top:12px">mem.used</div><div class="v" id="mem">—</div>
  <div class="k" style="margin-top:12px">agents</div><div class="v">3 online</div>
</div>
<div class="side r">
  <div class="k">net0</div><div class="v">LINK UP</div>
  <div class="k" style="margin-top:12px">git</div><div class="v">develop</div>
  <div class="k" style="margin-top:12px">backup</div><div class="v">current</div>
  <div class="k" style="margin-top:12px">tasks</div><div class="v" id="tasks">0 pending</div>
</div>

<div class="card">
  <div class="logo">GOB</div>
  <div class="logo-sub">system v0.2.0 // auth</div>
  <div class="out"><span class="hi">gob-system</span> ready. credentials required.</div>
  <div class="row"><span class="ps1">login --email &gt;</span><input type="email" placeholder="operator@domain.com" autofocus></div>
  <div class="row"><span class="ps1">login --pass &nbsp;&gt;</span><input type="password" placeholder=""></div>
  <button>[ AUTHENTICATE ]</button>
  <div class="status"><div class="pls"></div><span id="st">system nominal</span></div>
</div>
<div class="tag">concept-11-phosphor</div>
<script>
const logs=["agent:0 heartbeat 11ms","scheduler idle","net0 rx:2.4KB tx:0.8KB","agent:1 task complete","mem 1.3GB/8GB","cpu 11%","git HEAD develop","agent:2 spawned hacker","backup OK 03:00","kernel tick 0x47004200","watchdog all UP","agent:0 claude 2.1s"];
document.getElementById('tkr').textContent=logs.join('  ·  ')+'  ·  '+logs.join('  ·  ');
let start=Date.now()-(2*86400+18*3600+33*60)*1000;
function tick(){const e=Date.now()-start,d=Math.floor(e/86400000),h=Math.floor((e%86400000)/3600000),m=Math.floor((e%3600000)/60000);document.getElementById('upt').textContent=d+'d '+String(h).padStart(2,'0')+'h '+String(m).padStart(2,'0')+'m';document.getElementById('cpu').textContent=Math.floor(8+Math.random()*14)+' %';document.getElementById('mem').textContent=(1.1+Math.sin(Date.now()/25000)*0.3).toFixed(2)+' GB';document.getElementById('tasks').textContent=Math.random()>0.8?Math.floor(Math.random()*3)+' pending':'0 pending';}
tick();setInterval(tick,3000);
const st=['system nominal','agents online','net0 up','scheduler idle'];let si=0;
setInterval(()=>{si=(si+1)%st.length;document.getElementById('st').textContent=st[si];},4500);
</script>
</body>
</html>
