<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOB — Login / Concept 01: Minimal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #f8f8f6; font-family: 'Inter', sans-serif; color: #111; }
  body { display: flex; align-items: center; justify-content: center; }
  .wrap { width: 320px; }
  .logo { font-size: 11px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: #999; margin-bottom: 48px; }
  .logo span { color: #111; }
  h1 { font-size: 22px; font-weight: 400; margin-bottom: 32px; letter-spacing: -0.02em; }
  .field { margin-bottom: 16px; }
  label { display: block; font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: #999; margin-bottom: 8px; }
  input { width: 100%; border: none; border-bottom: 1px solid #ddd; background: transparent; padding: 8px 0; font-size: 15px; font-family: inherit; color: #111; outline: none; transition: border-color 0.2s; }
  input:focus { border-color: #111; }
  input::placeholder { color: #ccc; }
  .actions { margin-top: 32px; display: flex; align-items: center; justify-content: space-between; }
  button { background: #111; color: #fff; border: none; padding: 12px 28px; font-size: 13px; font-family: inherit; font-weight: 500; letter-spacing: 0.05em; cursor: pointer; transition: background 0.2s; }
  button:hover { background: #333; }
  .link { font-size: 12px; color: #999; text-decoration: none; }
  .link:hover { color: #111; }
  .tag { position: fixed; bottom: 24px; right: 24px; font-size: 10px; color: #ccc; letter-spacing: 0.1em; text-transform: uppercase; }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo"><span>GOB</span> &nbsp;/&nbsp; System</div>
  <h1>Sign in</h1>
  <div class="field"><label>Email</label><input type="email" placeholder="you@domain.com"></div>
  <div class="field"><label>Password</label><input type="password" placeholder="••••••••"></div>
  <div class="actions">
    <button>Continue</button>
    <a href="#" class="link">Forgot password</a>
  </div>
</div>
<div class="tag">Concept 01 — Minimal</div>
</body>
</html>
