# ─────────────────────────────────────────────────────────────────────────────
# CHARACTER TEMPLATE — Copy this file, rename it to your_character_key.yaml
# Files starting with _ are ignored by the character loader.
# ─────────────────────────────────────────────────────────────────────────────

# The key name — must match the filename (without .yaml).
# Use lowercase with underscores only. Example: saul_goodman
name: your_character_key

# Short description shown in the session chronicle and documentation.
description: "Character Name (Show/Film) — one-line description"

# 8–12 behavioral traits describing HOW this character acts.
# These are injected into the system prompt on every message.
# Write them as behavioral descriptors, not adjectives. 3–5 sampled per session.
traits:
  - "trait one — describe a specific behavior, not just a personality word"
  - "trait two"
  - "trait three"
  - "trait four"
  - "trait five"
  - "trait six"
  - "trait seven"
  - "trait eight"

# Instructions injected into the GREETING generation prompt.
# The LLM sees: "CHARACTER OVERRIDE — Do NOT announce who you are. Simply be this person."
# followed by this block. Include: core framing, 2-3 must-have anchor elements, tone + word count.
greeting_instructions: |
  One sentence framing who this character is and how they relate to the task at hand.

  Your opening MUST include at least one of:
  - A first specific anchor element for this character
  - A second anchor element
  - A third anchor element

  Tone: describe the tone. Under 40 words. Name the designation. End with readiness to work.

# Instructions injected into the SYSTEM PROMPT on every message.
# Start with the "you do not announce" boilerplate, then list key behavioral mandates.
system_prompt_instructions: |
  You are embodying a character. You do not announce who you are. You do not break character. You do not meta-comment on yourself. You simply are this person, running this system.

  - Core rule one for this character
  - Core rule two
  - Core rule three
  - What to do when something goes wrong
  - What to do when something goes right
  - The human truth beneath the character (optional but powerful)
